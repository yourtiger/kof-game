<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拳皇 - King of Fighters</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 800px;
  }
  #gameCanvas {
    display: block;
    border: 3px solid #ff4400;
    box-shadow: 0 0 30px #ff4400, 0 0 60px #ff220088;
    image-rendering: pixelated;
  }
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #controls {
    margin-top: 10px;
    color: #aaa;
    font-size: 12px;
    text-align: center;
    line-height: 1.8;
  }
  #controls span { color: #ff6600; font-weight: bold; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="450"></canvas>
</div>
<div id="controls">
  <span>玩家1：</span> A/D移动 &nbsp; W跳跃 &nbsp; S防御 &nbsp; J轻拳 &nbsp; K轻脚 &nbsp; U重拳 &nbsp; I重脚 &nbsp;
  <span>必杀技：</span> S+J=升龙拳 &nbsp; S+U=必杀
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── 常量 ───
const W = 800, H = 450;
const GROUND = 360;
const GRAVITY = 0.6;
const JUMP_FORCE = -14;
const MOVE_SPEED = 4;

// ─── 颜色主题 ───
const THEMES = {
  kyo: { primary:'#ff4400', secondary:'#ff8800', shadow:'#441100', glow:'#ff6600', name:'草薙京', bgGradient:['#1a0000','#330000'] },
  iori: { primary:'#aa00ff', secondary:'#ff00aa', shadow:'#220044', glow:'#cc44ff', name:'八神庵', bgGradient:['#0d0020','#200030'] }
};

// ─── 粒子系统 ───
class Particle {
  constructor(x, y, color, vx, vy, life, size) {
    this.x = x; this.y = y; this.color = color;
    this.vx = vx || (Math.random()-0.5)*6;
    this.vy = vy || (Math.random()-0.5)*6 - 2;
    this.life = life || 30;
    this.maxLife = this.life;
    this.size = size || Math.random()*4+2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15;
    this.life--;
    return this.life > 0;
  }
  draw() {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

let particles = [];
function spawnParticles(x, y, color, count, vxBase, vyBase) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color,
      vxBase + (Math.random()-0.5)*4,
      vyBase + (Math.random()-0.5)*4 - 1
    ));
  }
}

// ─── 特效文字 ───
class HitText {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 40; this.maxLife = 40;
    this.vy = -1.5;
  }
  update() { this.y += this.vy; this.life--; return this.life > 0; }
  draw() {
    const alpha = this.life / this.maxLife;
    const scale = 1 + (1 - alpha) * 0.5;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.scale(scale, scale);
    ctx.font = 'bold 22px Arial Black';
    ctx.textAlign = 'center';
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.fillText(this.text, 0, 0);
    ctx.restore();
  }
}
let hitTexts = [];

// ─── 角色类 ───
class Fighter {
  constructor(x, facing, theme, isPlayer) {
    this.x = x; this.y = GROUND;
    this.vy = 0; this.vx = 0;
    this.facing = facing; // 1=right, -1=left
    this.theme = THEMES[theme];
    this.themeKey = theme;
    this.isPlayer = isPlayer;
    this.hp = 500; this.maxHp = 500;
    this.power = 0; this.maxPower = 100;

    this.state = 'idle'; // idle, walk, jump, crouch, attack, block, hurt, ko
    this.stateTimer = 0;
    this.attackType = null;
    this.hitboxActive = false;
    this.hitCooldown = 0;
    this.blockTimer = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.hurtTimer = 0;
    this.invincible = 0;

    // 动画帧
    this.animFrame = 0;
    this.animTimer = 0;

    // 宽高
    this.w = 44; this.h = 88;

    // AI 状态
    this.aiTimer = 0;
    this.aiAction = null;
  }

  get cx() { return this.x; }
  get cy() { return this.y - this.h/2; }
  get foot() { return this.y; }

  isOnGround() { return this.y >= GROUND; }

  jump() {
    if (this.isOnGround() && this.state !== 'attack') {
      this.vy = JUMP_FORCE;
      this.state = 'jump';
      spawnParticles(this.x, this.y, this.theme.primary, 5, 0, 2);
    }
  }

  attack(type, enemy) {
    if (this.hurtTimer > 0 || this.blockTimer > 5) return;
    if (this.state === 'attack' && this.stateTimer > 3) return;
    this.state = 'attack';
    this.attackType = type;
    this.stateTimer = 0;
    this.hitboxActive = true;
    this.hitCooldown = 0;

    const durations = { light_punch:18, light_kick:20, heavy_punch:28, heavy_kick:32, special:40, super:55 };
    this.attackDuration = durations[type] || 20;
  }

  block(active) {
    if (this.state === 'attack') return;
    if (active) {
      this.state = 'crouch';
      this.blockTimer = 3;
    }
  }

  getHitbox() {
    if (!this.hitboxActive) return null;
    const reach = { light_punch:55, light_kick:60, heavy_punch:75, heavy_kick:80, special:100, super:120 }[this.attackType] || 60;
    const yOff = { light_punch:30, light_kick:20, heavy_punch:25, heavy_kick:10, special:20, super:15 }[this.attackType] || 25;
    return {
      x: this.x + this.facing * 20,
      y: this.y - yOff - 20,
      w: reach * this.facing,
      h: 30
    };
  }

  getAttackDmg() {
    const dmg = { light_punch:18, light_kick:22, heavy_punch:35, heavy_kick:40, special:60, super:90 };
    return dmg[this.attackType] || 20;
  }

  getAttackName() {
    const names = {
      light_punch:'轻拳', light_kick:'轻脚',
      heavy_punch:'重拳!', heavy_kick:'重脚!',
      special:'必杀技!!', super:'超必杀!!!',
      block_break:'破防!'
    };
    return names[this.attackType] || '攻击';
  }

  takeDamage(dmg, attacker) {
    if (this.invincible > 0) return false;
    // 防御减伤
    if (this.blockTimer > 0 && this.facing !== attacker.facing) {
      dmg = Math.floor(dmg * 0.15);
      spawnParticles(this.x, this.y - 40, '#88aaff', 8, -attacker.facing*2, -2);
      hitTexts.push(new HitText(this.x, this.y - 80, '防御!', '#88aaff'));
      this.hp = Math.max(0, this.hp - dmg);
      return true;
    }
    this.hp = Math.max(0, this.hp - dmg);
    this.hurtTimer = 18;
    this.state = 'hurt';
    this.invincible = 12;
    // 击退
    this.x += (this.facing === 1 ? -1 : 1) * (dmg * 0.5);
    this.x = Math.max(40, Math.min(W-40, this.x));
    // 粒子
    spawnParticles(this.x, this.y-40, attacker.theme.primary, 12, attacker.facing*3, -3);
    spawnParticles(this.x, this.y-40, '#ffffff', 5, attacker.facing*2, -5);
    // 增加能量
    attacker.power = Math.min(attacker.maxPower, attacker.power + dmg * 0.4);
    this.power = Math.min(this.maxPower, this.power + dmg * 0.2);
    return true;
  }

  update(enemy, keys) {
    // 计时器
    if (this.hurtTimer > 0) this.hurtTimer--;
    if (this.invincible > 0) this.invincible--;
    if (this.blockTimer > 0) this.blockTimer--;
    if (this.comboTimer > 0) {
      this.comboTimer--;
      if (this.comboTimer === 0) this.combo = 0;
    }
    if (this.hitCooldown > 0) this.hitCooldown--;
    this.animTimer++;

    // 朝向更新
    if (enemy && this.state !== 'attack') {
      this.facing = enemy.x > this.x ? 1 : -1;
    }

    // 重力
    if (!this.isOnGround()) {
      this.vy += GRAVITY;
    }
    this.y += this.vy;
    if (this.y >= GROUND) {
      this.y = GROUND; this.vy = 0;
      if (this.state === 'jump') this.state = 'idle';
    }

    // 位移
    this.x += this.vx;
    this.x = Math.max(40, Math.min(W-40, this.x));
    this.vx *= 0.7;

    // 攻击判定
    if (this.state === 'attack') {
      this.stateTimer++;
      const hitWindow = Math.floor(this.attackDuration * 0.35);
      this.hitboxActive = this.stateTimer >= 6 && this.stateTimer <= hitWindow + 6;

      if (this.hitboxActive && this.hitCooldown === 0 && enemy) {
        const hb = this.getHitbox();
        if (hb && this.checkHit(hb, enemy)) {
          const dmg = this.getAttackDmg();
          if (enemy.takeDamage(dmg, this)) {
            this.hitCooldown = this.attackDuration;
            this.combo++;
            this.comboTimer = 80;
            const col = this.theme.primary;
            hitTexts.push(new HitText(enemy.x, enemy.y - 90, this.getAttackName(), col));
            if (this.combo >= 3) {
              hitTexts.push(new HitText(enemy.x + 30, enemy.y - 120, this.combo + ' HIT!', '#ffff00'));
            }
          }
        }
      }
      if (this.stateTimer >= this.attackDuration) {
        this.state = 'idle';
        this.hitboxActive = false;
        this.attackType = null;
        this.stateTimer = 0;
      }
    }

    if (this.state === 'hurt' && this.hurtTimer === 0) {
      this.state = 'idle';
    }

    // 空闲时idle动画
    if (this.state === 'idle' || this.state === 'walk') {
      this.animFrame = Math.floor(this.animTimer / 12) % 4;
    }
  }

  checkHit(hb, enemy) {
    const ex = enemy.x - enemy.w/2;
    const ey = enemy.y - enemy.h;
    const ew = enemy.w;
    const eh = enemy.h;
    const hx = Math.min(hb.x, hb.x + hb.w);
    const hw = Math.abs(hb.w);
    return hx < ex+ew && hx+hw > ex && hb.y < ey+eh && hb.y+hb.h > ey;
  }

  // ─── 绘制 ───
  draw() {
    ctx.save();
    const bobY = (this.state === 'idle') ? Math.sin(this.animTimer * 0.15) * 2 : 0;
    const drawY = this.y + bobY;

    if (this.invincible > 0 && Math.floor(this.invincible/3) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    ctx.translate(this.x, drawY);
    ctx.scale(this.facing, 1);

    const t = this.theme;

    if (this.state === 'ko') {
      this.drawKO(t); ctx.restore(); return;
    }

    // 阴影
    ctx.save();
    ctx.scale(1, 0.25);
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 0, 24, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 根据状态绘制不同姿势
    if (this.state === 'hurt') {
      this.drawHurt(t);
    } else if (this.state === 'crouch') {
      this.drawCrouch(t);
    } else if (this.state === 'jump' || !this.isOnGround()) {
      this.drawJump(t);
    } else if (this.state === 'attack') {
      this.drawAttack(t);
    } else {
      this.drawIdle(t);
    }

    ctx.restore();

    // 能量特效光环（必杀技状态）
    if (this.attackType === 'special' || this.attackType === 'super') {
      this.drawAura();
    }
  }

  drawIdle(t) {
    const bob = Math.sin(this.animTimer * 0.15) * 2;
    // 腿部
    this.drawLegs(t, bob, false);
    // 躯干
    ctx.fillStyle = t.primary;
    ctx.shadowBlur = 8; ctx.shadowColor = t.glow;
    this.drawRoundRect(-14, -72+bob, 28, 36, 5);
    // 头部
    ctx.fillStyle = '#f5c07a';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(0, -82+bob, 14, 0, Math.PI*2); ctx.fill();
    // 头发
    ctx.fillStyle = t.primary;
    ctx.beginPath();
    ctx.moveTo(-14, -88+bob); ctx.lineTo(0, -96+bob); ctx.lineTo(14, -88+bob);
    ctx.lineTo(10, -80+bob); ctx.lineTo(-10, -80+bob); ctx.closePath();
    ctx.fill();
    // 眼睛
    ctx.fillStyle = t.secondary;
    ctx.fillRect(-6, -86+bob, 4, 4);
    ctx.fillRect(2, -86+bob, 4, 4);
    // 手臂
    this.drawArms(t, bob, false);
    // 腰带
    ctx.fillStyle = '#222';
    ctx.fillRect(-15, -40+bob, 30, 7);
    ctx.fillStyle = t.secondary;
    ctx.fillRect(-5, -40+bob, 10, 7);
  }

  drawAttack(t) {
    const prog = this.stateTimer / (this.attackDuration || 20);
    const ext = Math.sin(prog * Math.PI) * 1.4;
    // 腿
    ctx.fillStyle = '#333';
    if (this.attackType === 'light_kick' || this.attackType === 'heavy_kick') {
      ctx.fillRect(-12, -42, 14, 42);
      ctx.save();
      ctx.translate(8, -20);
      ctx.rotate(-Math.PI * 0.5 * ext);
      ctx.fillStyle = '#333';
      ctx.fillRect(0, 0, 12, 38);
      ctx.restore();
    } else {
      ctx.fillRect(-12, -42, 14, 42);
      ctx.fillRect(0, -42, 12, 42);
    }
    // 躯干
    ctx.fillStyle = t.primary;
    ctx.shadowBlur = 12; ctx.shadowColor = t.glow;
    ctx.save();
    ctx.translate(0, -56);
    ctx.rotate(-0.1 * this.facing * ext);
    this.drawRoundRect(-14, -16, 28, 36, 5);
    ctx.restore();
    ctx.shadowBlur = 0;
    // 头
    ctx.fillStyle = '#f5c07a';
    ctx.beginPath(); ctx.arc(0, -82, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = t.primary;
    ctx.beginPath();
    ctx.moveTo(-14, -88); ctx.lineTo(0, -96); ctx.lineTo(14, -88);
    ctx.lineTo(10, -80); ctx.lineTo(-10, -80); ctx.closePath(); ctx.fill();
    ctx.fillStyle = t.secondary;
    ctx.fillRect(-6, -86, 4, 4); ctx.fillRect(2, -86, 4, 4);
    // 攻击手臂
    ctx.save();
    const armExt = ext * 30;
    if (this.attackType === 'light_punch' || this.attackType === 'heavy_punch' || this.attackType === 'special' || this.attackType === 'super') {
      ctx.translate(14 + armExt, -58);
      ctx.fillStyle = '#f5c07a';
      this.drawRoundRect(-8, -8, 16, 28, 6);
      // 拳头光效
      if (this.attackType === 'special' || this.attackType === 'super') {
        ctx.shadowBlur = 20; ctx.shadowColor = t.primary;
        ctx.fillStyle = t.primary;
        ctx.globalAlpha = 0.6 * ext;
        ctx.beginPath(); ctx.arc(0, 20, 16 * ext, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      }
    } else {
      ctx.translate(-14, -58);
      ctx.fillStyle = '#f5c07a';
      this.drawRoundRect(-8, -8, 16, 28, 6);
    }
    ctx.restore();
    // 另一手臂
    ctx.fillStyle = '#f5c07a';
    ctx.fillRect(-22, -72, 10, 26);
    // 腰带
    ctx.fillStyle = '#222'; ctx.fillRect(-15, -40, 30, 7);
    ctx.fillStyle = t.secondary; ctx.fillRect(-5, -40, 10, 7);
  }

  drawJump(t) {
    ctx.fillStyle = '#333';
    ctx.save(); ctx.translate(-8, -30); ctx.rotate(-0.5); ctx.fillRect(0, 0, 12, 32); ctx.restore();
    ctx.save(); ctx.translate(4, -30); ctx.rotate(0.4); ctx.fillRect(0, 0, 12, 32); ctx.restore();
    ctx.fillStyle = t.primary;
    ctx.shadowBlur = 8; ctx.shadowColor = t.glow;
    this.drawRoundRect(-14, -72, 28, 36, 5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#f5c07a'; ctx.beginPath(); ctx.arc(0, -82, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = t.primary;
    ctx.beginPath(); ctx.moveTo(-14,-88); ctx.lineTo(0,-96); ctx.lineTo(14,-88); ctx.lineTo(10,-80); ctx.lineTo(-10,-80); ctx.closePath(); ctx.fill();
    ctx.fillStyle = t.secondary; ctx.fillRect(-6,-86,4,4); ctx.fillRect(2,-86,4,4);
    ctx.fillStyle = '#f5c07a';
    ctx.save(); ctx.translate(-18,-60); ctx.rotate(-0.4); this.drawRoundRect(-6,-6,12,26,4); ctx.restore();
    ctx.save(); ctx.translate(14,-60); ctx.rotate(0.4); this.drawRoundRect(-6,-6,12,26,4); ctx.restore();
    ctx.fillStyle = '#222'; ctx.fillRect(-15,-40,30,7);
    ctx.fillStyle = t.secondary; ctx.fillRect(-5,-40,10,7);
  }

  drawCrouch(t) {
    ctx.fillStyle = '#333';
    ctx.save(); ctx.translate(-12,-30); ctx.rotate(0.7); ctx.fillRect(0,0,12,32); ctx.restore();
    ctx.save(); ctx.translate(2,-30); ctx.rotate(-0.6); ctx.fillRect(0,0,12,32); ctx.restore();
    ctx.fillStyle = t.primary; ctx.shadowBlur = 6; ctx.shadowColor = t.glow;
    this.drawRoundRect(-16,-56,32,30,5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#f5c07a'; ctx.beginPath(); ctx.arc(0,-65,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = t.primary;
    ctx.beginPath(); ctx.moveTo(-13,-70); ctx.lineTo(0,-78); ctx.lineTo(13,-70); ctx.lineTo(9,-62); ctx.lineTo(-9,-62); ctx.closePath(); ctx.fill();
    ctx.fillStyle = t.secondary; ctx.fillRect(-5,-70,4,4); ctx.fillRect(2,-70,4,4);
    ctx.fillStyle = '#f5c07a';
    ctx.fillRect(-22,-58,10,22); ctx.fillRect(14,-58,10,22);
    // 防御盾光
    if (this.blockTimer > 0) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#88aaff';
      ctx.shadowBlur = 15; ctx.shadowColor = '#88aaff';
      ctx.beginPath(); ctx.arc(18, -44, 20, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
  }

  drawHurt(t) {
    const shake = Math.sin(this.hurtTimer * 0.8) * 4;
    ctx.translate(shake, 0);
    ctx.fillStyle = '#333';
    ctx.fillRect(-14,-42,13,42); ctx.fillRect(2,-42,12,42);
    ctx.fillStyle = '#cc4422'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff0000';
    this.drawRoundRect(-14,-72,28,36,5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#f5c07a'; ctx.beginPath(); ctx.arc(0,-82,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = t.primary;
    ctx.beginPath(); ctx.moveTo(-14,-88); ctx.lineTo(0,-96); ctx.lineTo(14,-88); ctx.lineTo(10,-80); ctx.lineTo(-10,-80); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff3300'; ctx.fillRect(-6,-86,4,4); ctx.fillRect(2,-86,4,4);
    ctx.fillStyle = '#f5c07a'; ctx.fillRect(-22,-72,10,28); ctx.fillRect(14,-72,10,28);
    ctx.fillStyle = '#222'; ctx.fillRect(-15,-40,30,7);
    ctx.fillStyle = t.secondary; ctx.fillRect(-5,-40,10,7);
  }

  drawKO(t) {
    ctx.fillStyle = '#333'; ctx.fillRect(-14,-20,28,20);
    ctx.fillStyle = t.shadow; this.drawRoundRect(-16,-36,32,22,4);
    ctx.fillStyle = '#f5c07a'; ctx.beginPath(); ctx.arc(0,-46,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = t.primary;
    ctx.beginPath(); ctx.moveTo(-14,-52); ctx.lineTo(0,-60); ctx.lineTo(14,-52); ctx.lineTo(10,-44); ctx.lineTo(-10,-44); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#333'; ctx.fillRect(-6,-50,4,3); ctx.fillRect(2,-50,4,3);
    ctx.fillStyle = t.shadow;
    ctx.save(); ctx.translate(-18,-36); ctx.rotate(0.8); ctx.fillRect(-5,-5,10,26); ctx.restore();
    ctx.save(); ctx.translate(18,-36); ctx.rotate(-0.6); ctx.fillRect(-5,-5,10,26); ctx.restore();
  }

  drawLegs(t, bob, walk) {
    ctx.fillStyle = '#333';
    const la = walk ? Math.sin(this.animTimer*0.2)*0.4 : 0;
    ctx.save(); ctx.translate(-8,-30+bob); ctx.rotate(la); ctx.fillRect(0,0,12,38); ctx.restore();
    ctx.save(); ctx.translate(2,-30+bob); ctx.rotate(-la); ctx.fillRect(0,0,12,38); ctx.restore();
  }

  drawArms(t, bob, walk) {
    ctx.fillStyle = '#f5c07a';
    const aa = walk ? Math.sin(this.animTimer*0.2)*0.3 : Math.sin(this.animTimer*0.15)*0.1;
    ctx.save(); ctx.translate(-20,-68+bob); ctx.rotate(-aa); this.drawRoundRect(-5,-5,10,28,4); ctx.restore();
    ctx.save(); ctx.translate(12,-68+bob); ctx.rotate(aa); this.drawRoundRect(-5,-5,10,28,4); ctx.restore();
  }

  drawAura() {
    const t = this.theme;
    const pulse = 0.7 + Math.sin(this.animTimer * 0.3) * 0.3;
    ctx.save();
    ctx.globalAlpha = 0.35 * pulse;
    ctx.fillStyle = t.primary;
    ctx.shadowBlur = 30;
    ctx.shadowColor = t.glow;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - this.h/2, 34*pulse, 50*pulse, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    // 火焰粒子
    if (Math.random() < 0.4) {
      spawnParticles(this.x + (Math.random()-0.5)*20, this.y - Math.random()*80, t.primary, 1, 0, -2);
    }
  }

  drawRoundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
    ctx.fill();
  }
}

// ─── AI 控制器 ───
class AIController {
  constructor(fighter, enemy) {
    this.f = fighter;
    this.enemy = enemy;
    this.timer = 0;
    this.difficulty = 0.65;
    this.action = null;
    this.actionTimer = 0;
  }

  update() {
    this.timer++;
    if (this.actionTimer > 0) { this.actionTimer--; return; }

    const f = this.f, e = this.enemy;
    const dist = Math.abs(f.x - e.x);
    const r = Math.random();

    if (f.state === 'attack' || f.state === 'hurt') return;

    // 低血量更激进
    const aggr = f.hp < 150 ? 1.3 : 1.0;

    if (dist > 200) {
      // 冲过去
      f.vx = f.facing * MOVE_SPEED * 0.9;
      f.state = 'walk';
      this.actionTimer = 15;
    } else if (dist < 55) {
      if (r < 0.3 * aggr) {
        // 跳跃逃离
        f.jump();
        this.actionTimer = 20;
      } else if (r < 0.6 * aggr) {
        // 攻击
        const types = ['light_punch','light_kick','heavy_punch','heavy_kick'];
        const type = types[Math.floor(Math.random() * types.length)];
        f.attack(type, e);
        this.actionTimer = 22;
      } else if (r < 0.75 && f.power >= 100) {
        f.attack('super', e); f.power = 0;
        this.actionTimer = 35;
      } else if (r < 0.85 && f.power >= 60) {
        f.attack('special', e); f.power -= 60;
        this.actionTimer = 28;
      } else {
        // 防御
        f.block(true);
        this.actionTimer = 12;
      }
    } else {
      // 中距离
      if (r < 0.35 * aggr) {
        f.vx = f.facing * MOVE_SPEED;
        f.state = 'walk';
        this.actionTimer = 10;
      } else if (r < 0.55 * aggr) {
        const types = ['heavy_punch','heavy_kick','light_punch'];
        f.attack(types[Math.floor(Math.random()*types.length)], e);
        this.actionTimer = 20;
      } else if (r < 0.65 && f.power >= 60) {
        f.attack('special', e); f.power -= 60;
        this.actionTimer = 28;
      } else if (r < 0.75 && f.power >= 100) {
        f.attack('super', e); f.power = 0;
        this.actionTimer = 35;
      } else if (r < 0.85) {
        f.jump();
        this.actionTimer = 18;
      } else {
        f.block(true);
        this.actionTimer = 8;
      }
    }
  }
}

// ─── 游戏主体 ───
const game = {
  state: 'menu', // menu, select, fighting, roundEnd, gameOver
  round: 1,
  p1Wins: 0,
  p2Wins: 0,
  timer: 99,
  timerTick: 0,
  p1: null, p2: null,
  ai: null,
  selectedChar: 0, // 0=kyo, 1=iori
  bgScroll: 0,
  screenShake: 0,
  menuAnim: 0,

  init() {
    this.p1 = new Fighter(200, 1, 'kyo', true);
    this.p2 = new Fighter(600, -1, 'iori', false);
    this.ai = new AIController(this.p2, this.p1);
    this.timer = 99;
    this.timerTick = 0;
    particles = [];
    hitTexts = [];
  },

  reset() {
    this.init();
  },

  startFight() {
    this.state = 'fighting';
    this.reset();
    this.showRoundText = true;
    this.roundTextTimer = 90;
  },

  update(keys) {
    this.menuAnim++;
    this.bgScroll = (this.bgScroll + 0.3) % W;

    if (this.screenShake > 0) this.screenShake--;

    if (this.state === 'fighting') {
      this.timerTick++;
      if (this.timerTick >= 60) { this.timerTick = 0; this.timer--; }
      if (this.timer <= 0) this.timer = 0;

      if (this.roundTextTimer > 0) {
        this.roundTextTimer--;
        return;
      }

      // P1 输入
      const p1 = this.p1, p2 = this.p2;

      if (keys['a'] || keys['arrowleft']) { p1.vx = -MOVE_SPEED; p1.state = 'walk'; }
      else if (keys['d'] || keys['arrowright']) { p1.vx = MOVE_SPEED; p1.state = 'walk'; }
      else if (p1.state === 'walk') { p1.state = 'idle'; }

      if ((keys['w'] || keys['arrowup']) && !game._jumpHeld) { p1.jump(); game._jumpHeld = true; }
      if (!keys['w'] && !keys['arrowup']) game._jumpHeld = false;

      if (keys['s'] || keys['arrowdown']) p1.block(true);
      else p1.blockTimer = 0;

      // 必杀技
      if ((keys['s'] || keys['arrowdown']) && keys['j'] && p1.state !== 'attack') {
        p1.attack('special', p2); p1.power = Math.max(0, p1.power - 60);
        this.screenShake = 8;
      } else if ((keys['s'] || keys['arrowdown']) && keys['u'] && p1.power >= 100 && p1.state !== 'attack') {
        p1.attack('super', p2); p1.power = 0;
        this.screenShake = 15;
      } else if (keys['j'] && !game._jHeld) { p1.attack('light_punch', p2); game._jHeld = true; }
      else if (keys['k'] && !game._kHeld) { p1.attack('light_kick', p2); game._kHeld = true; }
      else if (keys['u'] && !game._uHeld) { p1.attack('heavy_punch', p2); game._uHeld = true; }
      else if (keys['i'] && !game._iHeld) { p1.attack('heavy_kick', p2); game._iHeld = true; }

      if (!keys['j']) game._jHeld = false;
      if (!keys['k']) game._kHeld = false;
      if (!keys['u']) game._uHeld = false;
      if (!keys['i']) game._iHeld = false;

      // AI
      this.ai.update();

      // 更新
      p1.update(p2, keys);
      p2.update(p1, keys);

      // 粒子/文字
      particles = particles.filter(p => p.update());
      hitTexts = hitTexts.filter(t => t.update());

      // KO判断
      if (p1.hp <= 0 || p2.hp <= 0 || this.timer === 0) {
        if (p1.hp <= 0) { p1.state = 'ko'; this.p2Wins++; }
        else if (p2.hp <= 0) { p2.state = 'ko'; this.p1Wins++; }
        else { // 时间到
          if (p1.hp > p2.hp) this.p1Wins++;
          else if (p2.hp > p1.hp) this.p2Wins++;
        }
        this.state = 'roundEnd';
        this.roundEndTimer = 120;
        this.screenShake = 20;
        spawnParticles(W/2, H/2, '#ffff00', 30, 0, -5);
      }
    } else if (this.state === 'roundEnd') {
      this.roundEndTimer--;
      particles = particles.filter(p => p.update());
      hitTexts = hitTexts.filter(t => t.update());
      if (this.roundEndTimer <= 0) {
        if (this.p1Wins >= 2 || this.p2Wins >= 2) {
          this.state = 'gameOver';
        } else {
          this.round++;
          this.state = 'fighting';
          this.reset();
          this.showRoundText = true;
          this.roundTextTimer = 90;
        }
      }
    }
  },

  draw() {
    const shakeX = this.screenShake > 0 ? (Math.random()-0.5)*this.screenShake*0.5 : 0;
    const shakeY = this.screenShake > 0 ? (Math.random()-0.5)*this.screenShake*0.3 : 0;
    ctx.save();
    ctx.translate(shakeX, shakeY);

    if (this.state === 'menu') {
      this.drawMenu();
    } else if (this.state === 'select') {
      this.drawSelect();
    } else if (this.state === 'fighting' || this.state === 'roundEnd') {
      this.drawFight();
    } else if (this.state === 'gameOver') {
      this.drawFight();
      this.drawGameOver();
    }
    ctx.restore();
  },

  drawBG() {
    // 渐变背景
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0a0015');
    grad.addColorStop(0.6,'#15002a');
    grad.addColorStop(1,'#050010');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // 动态线条背景
    ctx.strokeStyle = 'rgba(100,0,200,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 10; i++) {
      const x = ((i*120 + this.bgScroll*0.5) % (W+120)) - 60;
      ctx.beginPath();
      ctx.moveTo(x, 0); ctx.lineTo(x + 60, H);
      ctx.stroke();
    }

    // 地面
    const floorGrad = ctx.createLinearGradient(0, GROUND-10, 0, H);
    floorGrad.addColorStop(0,'#220044');
    floorGrad.addColorStop(0.3,'#110022');
    floorGrad.addColorStop(1,'#000000');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, GROUND-10, W, H - GROUND + 10);

    // 地板反光线
    ctx.strokeStyle = 'rgba(150,50,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND-10); ctx.lineTo(W, GROUND-10);
    ctx.stroke();

    // 地板格子反光
    ctx.strokeStyle = 'rgba(100,0,200,0.08)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      const rx = (x + this.bgScroll) % W;
      ctx.beginPath();
      ctx.moveTo(rx, GROUND-10);
      ctx.lineTo(rx + 30, H);
      ctx.stroke();
    }

    // 背景装饰建筑轮廓
    ctx.fillStyle = 'rgba(50,0,100,0.3)';
    const bx = this.bgScroll % 400;
    for (let i = -1; i < 3; i++) {
      const bxi = i * 400 - bx;
      ctx.fillRect(bxi, 200, 60, 165);
      ctx.fillRect(bxi+80, 220, 40, 145);
      ctx.fillRect(bxi+140, 180, 80, 185);
      ctx.fillRect(bxi+240, 210, 50, 155);
      ctx.fillRect(bxi+310, 230, 70, 135);
    }

    // 月亮
    ctx.fillStyle = 'rgba(220,180,255,0.25)';
    ctx.shadowBlur = 30; ctx.shadowColor = '#aa44ff';
    ctx.beginPath(); ctx.arc(W-80, 60, 35, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  },

  drawHUD() {
    const p1 = this.p1, p2 = this.p2;
    const barW = 300, barH = 20;

    // P1 血量
    ctx.fillStyle = '#111';
    ctx.fillRect(10, 12, barW, barH);
    const p1Pct = p1.hp / p1.maxHp;
    const p1Color = p1Pct > 0.5 ? '#44ff44' : p1Pct > 0.25 ? '#ffaa00' : '#ff2200';
    const p1Grad = ctx.createLinearGradient(10, 0, 10+barW, 0);
    p1Grad.addColorStop(0, p1Color); p1Grad.addColorStop(1, '#ffffff44');
    ctx.fillStyle = p1Grad;
    ctx.fillRect(10, 12, barW * p1Pct, barH);
    ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1.5;
    ctx.strokeRect(10, 12, barW, barH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(THEMES['kyo'].name, 12, 9);

    // P2 血量
    ctx.fillStyle = '#111';
    ctx.fillRect(W-barW-10, 12, barW, barH);
    const p2Pct = p2.hp / p2.maxHp;
    const p2Color = p2Pct > 0.5 ? '#44ff44' : p2Pct > 0.25 ? '#ffaa00' : '#ff2200';
    const p2Grad = ctx.createLinearGradient(W-barW-10, 0, W-10, 0);
    p2Grad.addColorStop(0, '#ffffff44'); p2Grad.addColorStop(1, p2Color);
    ctx.fillStyle = p2Grad;
    ctx.fillRect(W - barW - 10 + barW*(1-p2Pct), 12, barW*p2Pct, barH);
    ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1.5;
    ctx.strokeRect(W-barW-10, 12, barW, barH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(THEMES['iori'].name, W-12, 9);

    // P1 能量条
    ctx.fillStyle = '#111';
    ctx.fillRect(10, 36, 160, 10);
    ctx.fillStyle = p1.power >= 100 ? '#ffdd00' : '#0088ff';
    ctx.shadowBlur = p1.power >= 100 ? 8 : 0;
    ctx.shadowColor = p1.power >= 100 ? '#ffdd00' : '#0088ff';
    ctx.fillRect(10, 36, 160 * (p1.power/p1.maxPower), 10);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1;
    ctx.strokeRect(10, 36, 160, 10);
    ctx.fillStyle = '#88aaff'; ctx.font = '9px Arial'; ctx.textAlign = 'left';
    ctx.fillText('POWER', 12, 34);

    // P2 能量条
    ctx.fillStyle = '#111';
    ctx.fillRect(W-170, 36, 160, 10);
    ctx.fillStyle = p2.power >= 100 ? '#ffdd00' : '#cc44ff';
    ctx.shadowBlur = p2.power >= 100 ? 8 : 0;
    ctx.shadowColor = p2.power >= 100 ? '#ffdd00' : '#cc44ff';
    ctx.fillRect(W - 170 + 160*(1-p2.power/p2.maxPower), 36, 160*(p2.power/p2.maxPower), 10);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1;
    ctx.strokeRect(W-170, 36, 160, 10);
    ctx.fillStyle = '#cc88ff'; ctx.font = '9px Arial'; ctx.textAlign = 'right';
    ctx.fillText('POWER', W-12, 34);

    // 计时器
    const timeColor = this.timer <= 10 ? '#ff3300' : '#ffffff';
    ctx.fillStyle = '#111';
    ctx.fillRect(W/2-25, 8, 50, 28);
    ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1.5;
    ctx.strokeRect(W/2-25, 8, 50, 28);
    ctx.fillStyle = timeColor;
    ctx.shadowBlur = this.timer<=10 ? 10 : 0; ctx.shadowColor = '#ff3300';
    ctx.font = 'bold 22px Arial Black';
    ctx.textAlign = 'center';
    ctx.fillText(this.timer, W/2, 30);
    ctx.shadowBlur = 0;

    // Round 胜利标志
    for (let i = 0; i < 2; i++) {
      const won = i === 0 ? this.p1Wins > i : this.p2Wins > i;
      const x = i === 0 ? barW/2 + 10 - (i===0?-30:30) : W - barW/2 - 10 + (i===0?-30:30);
      // P1 wins
    }
    // P1胜场
    for (let i = 0; i < 2; i++) {
      const filled = this.p1Wins > i;
      ctx.fillStyle = filled ? '#ffdd00' : '#333';
      ctx.shadowBlur = filled ? 6 : 0; ctx.shadowColor = '#ffdd00';
      ctx.beginPath(); ctx.arc(160 + i*20, 52, 6, 0, Math.PI*2); ctx.fill();
    }
    // P2胜场
    for (let i = 0; i < 2; i++) {
      const filled = this.p2Wins > i;
      ctx.fillStyle = filled ? '#ffdd00' : '#333';
      ctx.shadowBlur = filled ? 6 : 0; ctx.shadowColor = '#ffdd00';
      ctx.beginPath(); ctx.arc(W-160 - i*20, 52, 6, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Combo
    if (p1.combo >= 2 && p1.comboTimer > 0) {
      ctx.save();
      const alpha = Math.min(1, p1.comboTimer/20);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = THEMES.kyo.primary;
      ctx.shadowBlur = 15; ctx.shadowColor = THEMES.kyo.glow;
      ctx.font = 'bold 28px Arial Black';
      ctx.textAlign = 'left';
      ctx.fillText(p1.combo + ' COMBO!', 20, 90);
      ctx.restore();
    }
    if (p2.combo >= 2 && p2.comboTimer > 0) {
      ctx.save();
      const alpha = Math.min(1, p2.comboTimer/20);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = THEMES.iori.primary;
      ctx.shadowBlur = 15; ctx.shadowColor = THEMES.iori.glow;
      ctx.font = 'bold 28px Arial Black';
      ctx.textAlign = 'right';
      ctx.fillText(p2.combo + ' COMBO!', W-20, 90);
      ctx.restore();
    }
  },

  drawFight() {
    this.drawBG();

    // 粒子
    particles.forEach(p => p.draw());

    // 角色
    this.p2.draw();
    this.p1.draw();

    // 命中文字
    hitTexts.forEach(t => t.draw());

    // HUD
    this.drawHUD();

    // 回合文字
    if (this.showRoundText && this.roundTextTimer > 0) {
      const alpha = Math.min(1, this.roundTextTimer < 20 ? this.roundTextTimer/20 : 1);
      const scale = 1 + (1 - Math.min(1, (90-this.roundTextTimer)/30)) * 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(W/2, H/2);
      ctx.scale(scale, scale);
      ctx.font = 'bold 52px Arial Black';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffdd00';
      ctx.shadowBlur = 20; ctx.shadowColor = '#ff8800';

        ctx.shadowColor = '#ffffff';
        ctx.font = 'bold 40px Arial Black';
        ctx.fillText('FIGHT!', 0, 40);
      }
      ctx.restore();

    // KO文字
    if (this.state === 'roundEnd') {
      const alpha = Math.min(1, (120 - this.roundEndTimer) / 15);

      const scale = 1 + (1-alpha)*2;

      if (this.p1.hp <= 0 || (this.timer === 0 && this.p2.hp > this.p1.hp)) {

        ctx.textAlign = 'center';

      } else if (this.p2.hp <= 0 || (this.timer === 0 && this.p1.hp > this.p2.hp)) {

        ctx.shadowBlur = 25; ctx.shadowColor = '#ff0000';
        ctx.font = 'bold 72px Arial Black';
        ctx.textAlign = 'center';

        ctx.fillStyle = '#aaaaff';
        ctx.shadowBlur = 20; ctx.shadowColor = '#aaaaff';
        ctx.font = 'bold 52px Arial Black';
        ctx.textAlign = 'center';
        ctx.fillText('TIME UP!', 0, 0);
      }
      ctx.restore();
    }
  },

  drawRoundRect2(x,y,w,h,r) {
    ctx.beginPath();

    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath(); ctx.fill();

  drawCharPreview(key, anim) {
    const t = THEMES[key];
    const bob = Math.sin(anim*0.08)*3;
    // 腿
    ctx.fillStyle = '#333';
    ctx.fillRect(-10,-30+bob,10,30); ctx.fillRect(2,-30+bob,10,30);
    // 躯干
    ctx.fillStyle = t.primary; ctx.shadowBlur = 10; ctx.shadowColor = t.glow;
    ctx.beginPath(); ctx.roundRect(-14,-66+bob,28,36,5); ctx.fill();
    ctx.shadowBlur = 0;
    // 头
    ctx.fillStyle = '#f5c07a';
    ctx.beginPath(); ctx.arc(0,-76+bob,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = t.primary;
    ctx.beginPath(); ctx.moveTo(-13,-82+bob); ctx.lineTo(0,-90+bob); ctx.lineTo(13,-82+bob);
    ctx.lineTo(9,-74+bob); ctx.lineTo(-9,-74+bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = t.secondary;
    ctx.fillRect(-5,-81+bob,4,4); ctx.fillRect(2,-81+bob,4,4);
    // 手臂
    ctx.fillStyle = '#f5c07a';
    ctx.fillRect(-22,-66+bob,9,24); ctx.fillRect(14,-66+bob,9,24);
    // 腰带
    ctx.fillStyle = '#222'; ctx.fillRect(-14,-34+bob,28,6);
    ctx.fillStyle = t.secondary; ctx.fillRect(-4,-34+bob,8,6);
    // 气场
    ctx.globalAlpha = 0.2 + Math.sin(anim*0.1)*0.1;
    ctx.fillStyle = t.primary; ctx.shadowBlur = 20; ctx.shadowColor = t.glow;
    ctx.beginPath(); ctx.ellipse(0,-40+bob,20,40,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  },

  drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0,0,W,H);

    const winner = this.p1Wins >= 2 ? '玩家获胜！' : 'CPU获胜...';
    const subtext = this.p1Wins >= 2 ? 'PLAYER WINS' : 'CPU WINS';
    const col = this.p1Wins >= 2 ? '#ffdd00' : '#ff4400';
    const glow = this.p1Wins >= 2 ? '#ffaa00' : '#ff0000';

    ctx.save();
    ctx.translate(W/2, H/2-30);
    ctx.font = 'bold 64px Arial Black';
    ctx.textAlign = 'center';
    ctx.fillStyle = col;
    ctx.shadowBlur = 25; ctx.shadowColor = glow;
    ctx.fillText(subtext, 0, 0);

    ctx.font = '28px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 0;
    ctx.fillText(winner, 0, 50);
    ctx.restore();

    // 重新开始按钮
    const btnPulse = 1 + Math.sin(this.menuAnim*0.1)*0.05;
    ctx.save();
    ctx.translate(W/2, H/2+110);
    ctx.scale(btnPulse, btnPulse);
    const btnGrad = ctx.createLinearGradient(-90,0,90,0);
    btnGrad.addColorStop(0,'#440088'); btnGrad.addColorStop(0.5,'#8800cc'); btnGrad.addColorStop(1,'#440088');
    ctx.fillStyle = btnGrad;
    ctx.shadowBlur = 15; ctx.shadowColor = '#aa44ff';
    this.drawRoundRect2(-90,-18,180,36,8);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 17px Arial Black';
    ctx.textAlign = 'center';
    ctx.fillText('再来一局 PLAY AGAIN', 0, 8);
    ctx.restore();
  }
};

// ─── 输入 ───
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if ((e.key === 'Enter' || e.key === ' ') && game.state === 'menu') {
    game.startFight();
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// 点击事件
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  if (game.state === 'menu') {
    // 开始按钮区域
    if (mx > W/2-80 && mx < W/2+80 && my > 377 && my < 413) {
      game.startFight();
    }
  } else if (game.state === 'gameOver') {
    // 再来一局按钮
    if (mx > W/2-90 && mx < W/2+90 && my > H/2+92 && my < H/2+128) {
      game.p1Wins = 0; game.p2Wins = 0; game.round = 1;
      game.state = 'menu';
    }
  }
});

// ─── 游戏主循环 ───
game.menuAnim = 0;

function loop() {
  ctx.clearRect(0,0,W,H);
  game.update(keys);
  game.draw();
  requestAnimationFrame(loop);
}

loop();

// 添加控制说明到页面
const ctrl = document.createElement('div');
ctrl.style.cssText = 'color:#666;font-size:11px;text-align:center;margin-top:6px;line-height:1.7';
ctrl.innerHTML = `
  <span style="color:#ff6600;font-weight:bold">玩家操控：</span>
  <b style="color:#aaa">A/D</b> 左右移动 &nbsp;
  <b style="color:#aaa">W</b> 跳跃 &nbsp;
  <b style="color:#aaa">S</b> 防御/蹲 &nbsp;
  <b style="color:#aaa">J</b> 轻拳 &nbsp;
  <b style="color:#aaa">K</b> 轻脚 &nbsp;
  <b style="color:#aaa">U</b> 重拳 &nbsp;
  <b style="color:#aaa">I</b> 重脚 &nbsp;
  <span style="color:#ffdd00;font-weight:bold">必杀：</span>
  <b style="color:#aaa">S+J</b> 必杀技 &nbsp;
  <b style="color:#aaa">S+U</b> 超必杀(满能量)
`;
document.getElementById('gameContainer').after(ctrl);
document.getElementById('controls').remove();
</script>
